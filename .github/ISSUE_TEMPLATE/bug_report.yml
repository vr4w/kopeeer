name: Bug report
description: Report something that did not work as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping FileRail become calmer and more reliable.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2, Windows 10 22H2, ..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Select files in Explorer
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add logs, screenshots, or details about source and destination folders if useful. Do not include private file contents.

