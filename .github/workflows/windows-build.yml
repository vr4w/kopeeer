name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Kopeeer.sln

      - name: Build solution
        run: dotnet build Kopeeer.sln --configuration Release --no-restore

      - name: Validate project structure
        run: python tools\validate_project.py
