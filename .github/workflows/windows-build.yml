name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build core
        run: dotnet build src\FileOperationQueue.Core\FileOperationQueue.Core.csproj --configuration Release

      - name: Build app
        run: dotnet build src\FileOperationQueue.App\FileOperationQueue.App.csproj --configuration Release

      - name: Validate project structure
        run: python tools\validate_project.py

