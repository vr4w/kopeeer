name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Kopeeer.sln

      - name: Build solution
        run: dotnet build Kopeeer.sln --configuration Release --no-restore

      - name: Validate project structure
        run: python tools\validate_project.py

      - name: Install Inno Setup
        if: github.event_name != 'pull_request'
        run: choco install innosetup --no-progress -y

      - name: Build installer
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $version = "0.2.0-alpha"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          .\scripts\build-installer.ps1 -Version $version

      - name: Upload installer artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Kopeeer-Setup
          path: artifacts\installer\Kopeeer-Setup-*.exe

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts\installer\Kopeeer-Setup-*.exe --title "${{ github.ref_name }}" --notes "Kopeeer alpha installer." --prerelease
